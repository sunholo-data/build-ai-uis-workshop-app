# Aitana MCP App sandbox proxy — Cloud Build configuration.
#
# Single-container Cloud Run service. Mirrors the shape of
# backend/cloudbuild.yaml (the simpler aitana-v6-backend pattern) without
# secrets, without GCS volume mounts, and with public access — the
# sandbox iframe is loaded by the browser from this URL on a SEPARATE
# origin from the host frontend (per MCP Apps spec, see sprint 1.24).
#
# Branch-based deployment: dev -> your-project-id (only env this
# sprint; test/prod follow the same shape when they're cut). Substitutions
# managed by Terraform — see multivac-aitana infrastructure repo.

substitutions:
  _SERVICE_NAME: mcp-sandbox
  _REGION: terraform_managed
  _ARTIFACT_REGISTRY_REPO_URL_CLIENT: terraform_managed
  _PROJECT_ID: terraform_managed
  # Comma-separated origins permitted to embed this sandbox as an iframe.
  # Validated against document.referrer in sandbox.ts on every load.
  # Defaults to the dev frontend URL so the build is self-contained for
  # the dev deploy this sprint. test/prod cuts override via terraform.
  _ALLOWED_HOST_ORIGINS: 'https://aitana-v6-frontend-66pa3y5xnq-ew.a.run.app'
  # #6 (template-cloudbuild-hardening.md): project-local log bucket.
  # Created by scripts/bootstrap-gcp-project.sh; forks don't hit the
  # Aitana-owned multivac-deploy-aitana-logging-bucket.
  _LOG_BUCKET: 'gs://${_PROJECT_ID}-cloudbuild-logs'

tags: ['${_PROJECT_ID}', '${_SERVICE_NAME}']

options:
  logging: GCS_ONLY
logsBucket: '${_LOG_BUCKET}'

steps:
  # --- Build the sandbox image ---
  - name: 'gcr.io/cloud-builders/docker'
    id: build-mcp-sandbox
    dir: infrastructure/mcp-sandbox
    args:
      - 'build'
      - '-t'
      - '${_ARTIFACT_REGISTRY_REPO_URL_CLIENT}/${_SERVICE_NAME}/sandbox:${BRANCH_NAME}'
      - '.'

  # --- Push image ---
  - name: 'gcr.io/cloud-builders/docker'
    id: push-mcp-sandbox
    waitFor: ['build-mcp-sandbox']
    args:
      - 'push'
      - '${_ARTIFACT_REGISTRY_REPO_URL_CLIENT}/${_SERVICE_NAME}/sandbox:${BRANCH_NAME}'

  # --- Deploy to Cloud Run (single container, public) ---
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    waitFor: ['push-mcp-sandbox']
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--region=${_REGION}'
      - '--project=${_PROJECT_ID}'
      - '--platform=managed'
      - '--allow-unauthenticated'           # browser-loaded iframe; allUsers
      - '--max-instances=3'
      - '--image=${_ARTIFACT_REGISTRY_REPO_URL_CLIENT}/${_SERVICE_NAME}/sandbox:${BRANCH_NAME}'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--set-env-vars=ALLOWED_HOST_ORIGINS=${_ALLOWED_HOST_ORIGINS}'

  # --- Smoke probe ---
  # cloud-sdk image has both gcloud + curl. Resolve the service URL after
  # deploy (Cloud Run assigns a deterministic *.run.app URL but we can't
  # hardcode it — the project/region prefix is terraform-managed). Fail
  # the build if /healthz is anything other than 200.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: smoke
    entrypoint: bash
    args:
      - '-c'
      - |
        sleep 10
        URL=$(gcloud run services describe ${_SERVICE_NAME} \
          --region=${_REGION} --project=${_PROJECT_ID} \
          --format='value(status.url)')
        if [ -z "$$URL" ]; then
          echo "ERROR: Could not resolve service URL" >&2
          exit 1
        fi
        # Probe /sandbox.html, NOT /healthz — Cloud Run's GFE intercepts
        # /healthz for its own internal liveness probes; user containers
        # never see those requests. /sandbox.html is the actual path the
        # iframe loads in production, so this is also a more meaningful
        # smoke than a synthetic health endpoint.
        echo "Probing $${URL}/sandbox.html ..."
        STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$${URL}/sandbox.html")
        echo "Status: $${STATUS}"
        if [ "$${STATUS}" != "200" ]; then
          echo "ERROR: $${URL}/sandbox.html returned $${STATUS} (expected 200)" >&2
          exit 1
        fi

timeout: 600s
